<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <!-- Background circle -->
  <circle cx="200" cy="230" r="180" fill="#16213e" stroke="#8a7034" stroke-width="1.5"/>

  <!-- Art Deco sunburst behind figure -->
  <g opacity="0.3">
    <line x1="200" y1="50" x2="200" y2="180" stroke="#c9a84c" stroke-width="1"/>
    <line x1="200" y1="50" x2="280" y2="160" stroke="#c9a84c" stroke-width="0.8" transform="rotate(15 200 230)"/>
    <line x1="200" y1="50" x2="280" y2="160" stroke="#c9a84c" stroke-width="0.8" transform="rotate(30 200 230)"/>
    <line x1="200" y1="50" x2="280" y2="160" stroke="#c9a84c" stroke-width="0.8" transform="rotate(45 200 230)"/>
    <line x1="200" y1="50" x2="280" y2="160" stroke="#c9a84c" stroke-width="0.8" transform="rotate(60 200 230)"/>
    <line x1="200" y1="50" x2="280" y2="160" stroke="#c9a84c" stroke-width="0.8" transform="rotate(-15 200 230)"/>
    <line x1="200" y1="50" x2="280" y2="160" stroke="#c9a84c" stroke-width="0.8" transform="rotate(-30 200 230)"/>
    <line x1="200" y1="50" x2="280" y2="160" stroke="#c9a84c" stroke-width="0.8" transform="rotate(-45 200 230)"/>
    <line x1="200" y1="50" x2="280" y2="160" stroke="#c9a84c" stroke-width="0.8" transform="rotate(-60 200 230)"/>
  </g>

  <!-- Concentric Art Deco arcs -->
  <path d="M 80 280 A 120 120 0 0 1 320 280" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M 100 280 A 100 100 0 0 1 300 280" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M 120 280 A 80 80 0 0 1 280 280" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.1"/>

  <!-- Figure — head -->
  <circle cx="200" cy="130" r="28" fill="#1a1a2e" stroke="#c9a84c" stroke-width="2"/>
  <!-- Hat brim -->
  <ellipse cx="200" cy="108" rx="34" ry="6" fill="#1a1a2e" stroke="#c9a84c" stroke-width="1.5"/>
  <!-- Hat crown -->
  <rect x="178" y="88" width="44" height="22" rx="4" fill="#1a1a2e" stroke="#c9a84c" stroke-width="1.5"/>
  <!-- Hat band -->
  <rect x="178" y="104" width="44" height="5" fill="#c9a84c" opacity="0.3"/>

  <!-- Shoulders / body -->
  <path d="M 155 175 Q 155 155 175 148 L 200 158 L 225 148 Q 245 155 245 175 L 245 290 L 155 290 Z"
        fill="#1a1a2e" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- Lapels -->
  <path d="M 175 148 L 195 200 L 175 200 Z" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>
  <path d="M 225 148 L 205 200 L 225 200 Z" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>

  <!-- Tie -->
  <path d="M 197 165 L 200 195 L 203 165 Z" fill="#c9a84c" opacity="0.4"/>

  <!-- Vest buttons -->
  <circle cx="200" cy="210" r="2.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="200" cy="230" r="2.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="200" cy="250" r="2.5" fill="#c9a84c" opacity="0.5"/>

  <!-- Desk -->
  <rect x="90" y="290" width="220" height="10" rx="2" fill="#0f3460" stroke="#c9a84c" stroke-width="1.5"/>
  <!-- Desk front panel -->
  <rect x="95" y="300" width="210" height="70" rx="2" fill="#16213e" stroke="#8a7034" stroke-width="1"/>
  <!-- Desk panel Art Deco inset -->
  <rect x="115" y="312" width="170" height="46" rx="2" fill="none" stroke="#8a7034" stroke-width="0.8" opacity="0.5"/>
  <!-- Desk diamond ornament -->
  <polygon points="200,320 210,335 200,350 190,335" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>

  <!-- Bell on desk -->
  <ellipse cx="280" cy="287" rx="12" ry="4" fill="#c9a84c" opacity="0.3"/>
  <path d="M 275 287 Q 275 275 280 272 Q 285 275 285 287" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <circle cx="280" cy="271" r="2" fill="#c9a84c" opacity="0.4"/>

  <!-- Key rack behind -->
  <g opacity="0.25">
    <rect x="120" y="240" width="8" height="14" rx="1" fill="none" stroke="#c9a84c" stroke-width="0.8"/>
    <rect x="135" y="240" width="8" height="14" rx="1" fill="none" stroke="#c9a84c" stroke-width="0.8"/>
    <rect x="257" y="240" width="8" height="14" rx="1" fill="none" stroke="#c9a84c" stroke-width="0.8"/>
    <rect x="272" y="240" width="8" height="14" rx="1" fill="none" stroke="#c9a84c" stroke-width="0.8"/>
  </g>

  <!-- Art Deco fan at bottom -->
  <g transform="translate(200,470)">
    <path d="M -60 0 L 0 -30 L 60 0" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M -45 0 L 0 -22 L 45 0" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.25"/>
    <path d="M -30 0 L 0 -14 L 30 0" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.2"/>
  </g>

  <!-- "CHARON" text -->
  <text x="200" y="430" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="bold"
        fill="#c9a84c" letter-spacing="8" opacity="0.7">CHARON</text>
  <text x="200" y="450" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="9" fill="#8a7034" letter-spacing="4" opacity="0.5">MAUDE</text>
</svg>
